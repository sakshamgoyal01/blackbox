name: BLACKBOX PR Scan

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  security-gate:
    runs-on: ubuntu-latest

    env:
      GATE_URL: ${{ secrets.GATE_URL }}
      GATE_API_KEY: ${{ secrets.GATE_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Trivy FS
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: json
          output: trivy.json

      - name: Trivy Config
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          format: json
          output: trivy-config.json

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: Semgrep

        uses: returntocorp/semgrep-action@v1

      - name: Normalize Findings

        run: |
          python scripts/normalize_findings.py

      - name: Upload Findings

        run: |
          python scripts/send_findings.py
          
      - name: Evaluate Gate

        run: |
          python scripts/evaluate_gate.py
          
