name: BLACKBOX PR Security Gate

on:

  push:
    branches:
      - "**"

  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

env:
  SERVICE_NAME: gate-service
  ENVIRONMENT: dev
  COMMIT_SHA: abc123
  POSTGRES_DB: blackbox
  POSTGRES_USER: blackbox
  POSTGRES_PASSWORD: 8929

jobs:

  security-gate:

    name: Scan → Normalize → Gate

    runs-on: ubuntu-latest

    steps:

      ##############################################################
      # Checkout
      ##############################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create gate-service .env
        run: |
          cat > gate-service/.env <<EOF
          DATABASE_URL=postgresql://blackbox:8929@postgres:5432/blackbox
          BLACKBOX_API_KEY=${{ secrets.GATE_API_KEY }}
          GITHUB_TOKEN=${{ secrets.TOKEN_GITHUB }}
          POSTGRES_DB=blackbox
          POSTGRES_USER=blackbox
          POSTGRES_PASSWORD=8929
          EOF

      - name: Start BLACKBOX stack
        run: |
          docker compose up -d --build

      - name: Show postgres environment
        run: |
         docker compose exec -T postgres env | grep POSTGRES
      
      - name: Show gate DATABASE_URL
        run: |
         docker compose exec -T gate-service sh -c 'echo $DATABASE_URL'
      - name: Test DB login
        run: |
          docker compose exec -T postgres \
            psql \
            -U "$POSTGRES_USER" \
            -d "$POSTGRES_DB" \
            -c "SELECT current_user;"
      - name: Wait for Gate Service
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:8000/health; then
              echo "Gate service is ready"
              exit 0
            fi
            sleep 2
          done

          echo "Gate service failed to start"
          docker compose logs
          exit 1

      - name: Run Migrations
        run: |
         docker compose exec -T gate-service \
           alembic upgrade head

      ##############################################################
      # Python
      ##############################################################

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      ##############################################################
      # Install Dependencies
      ##############################################################

      - name: Install Gate Dependencies
        working-directory: gate-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      ##############################################################
      # Install Semgrep
      ##############################################################

      - name: Install Semgrep
        run: |
          pip install semgrep

      ##############################################################
      # Trivy Filesystem Scan
      ##############################################################
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | \
            sudo sh -s -- -b /usr/local/bin

          trivy --version

      - name: Trivy Filesystem Scan
        run: |
          trivy fs \
            --skip-files gate-service/.env \
            --format json \
            --output trivy.json \
            .

      - name: Trivy Config Scan
        run: |
          trivy config \
            --format json \
            --output trivy-config.json \
            .
      ##############################################################
      # Gitleaks
      ##############################################################

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --report-format=json \
            --report-path=/repo/gitleaks.json

      ##############################################################
      # Semgrep
      ##############################################################

      - name: Run Semgrep
        run: |
          semgrep scan \
            --exclude gate-service/.env \
            --config=auto \
            --json \
            --output semgrep.json

      ##############################################################
      # Move Reports
      ##############################################################

      - name: Copy Reports
        run: |
          mkdir -p gate-service/tests/data

          cp trivy.json gate-service/tests/data/
          cp trivy-config.json gate-service/tests/data/

          cp gitleaks.json gate-service/tests/data/
          cp semgrep.json gate-service/tests/data/

      ##############################################################
      # Normalize
      ##############################################################

      - name: Normalize Findings
        working-directory: gate-service
        env:
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          COMMIT_SHA: ${{ github.sha }}
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          GATE_URL: ${{ secrets.GATE_URL }}
          GATE_API_KEY: ${{ secrets.GATE_API_KEY }}
        run: |
          python -m scripts.normalize_findings

      ##############################################################
      # Upload Findings
      ##############################################################
      - name: Register Service
        env:
          GATE_URL: ${{ secrets.GATE_URL }}
          GATE_API_KEY: ${{ secrets.GATE_API_KEY }}
        run: |
         curl -X POST http://localhost:8000/services \
         -H "Content-Type: application/json" \
         -H "X-API-Key: $GATE_API_KEY" \
         -d '{
           "name":"gate-service",
           "repo_url":"https://github.com/sakshamgoyal01/blackbox",
           "owner":"sakshamgoyal01",
           "criticality_tier":"standard",
           "environment":"dev"
           }'
      - name: Upload Findings
        working-directory: gate-service
        env:
          GATE_URL: ${{ env.GATE_URL }}
          GATE_API_KEY: ${{ env.GATE_API_KEY }}
        run: |
          python -m scripts.send_findings

      ##############################################################
      # Evaluate Gate
      ##############################################################

      - name: Evaluate Security Gate
        working-directory: gate-service
        env:
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          COMMIT_SHA: ${{ github.sha }}
          GATE_URL: ${{ env.GATE_URL }}
          GATE_API_KEY: ${{ env.GATE_API_KEY }}
        run: |
          python -m scripts.evaluate_gate

      ##############################################################
      # Upload Reports
      ##############################################################

      - name: Upload Security Reports
        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: blackbox-security-reports

          path: |
            trivy.json
            trivy-config.json
            semgrep.json
            gitleaks.json
            gate-service/normalized-findings.json
